<svg
  xmlns="http://www.w3.org/2000/svg"
  width="24"
  height="24"
  viewBox="0 0 24 24"
  fill="none"
  stroke="#e11d48"
  stroke-width="2"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <!-- Spinning circle loader -->
  <circle
    cx="12"
    cy="12"
    r="10"
    stroke="#fce7f3"
    stroke-width="3"
    fill="none"
  />
  <path
    d="M12 2 a10 10 0 0 1 10 10"
    stroke="#e11d48"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 12 12"
      to="360 12 12"
      dur="0.7s"
      repeatCount="indefinite"
    />
  </path>
</svg>